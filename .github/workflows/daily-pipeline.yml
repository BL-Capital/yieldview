name: Daily Pipeline

on:
  schedule:
    - cron: '0 6 * * *'   # 6h UTC every day
  workflow_dispatch:        # Manual trigger for testing

jobs:
  pipeline:
    name: Fetch → Generate → Publish
    runs-on: ubuntu-latest
    # DISABLED until Sprint 2b — remove this condition in Story 2.13
    if: false

    # Secrets to configure in GitHub Settings > Secrets and variables > Actions:
    # - ANTHROPIC_API_KEY    (Story 2.8 — Claude API client)
    # - FINNHUB_API_KEY      (Story 2.2 — Finnhub client)
    # - FRED_API_KEY         (Story 2.3 — FRED client)
    # - ALPHA_VANTAGE_API_KEY (Story 2.4 — Alpha Vantage client)
    # - R2_ACCESS_KEY_ID     (Story 2.11 — R2 client)
    # - R2_SECRET_ACCESS_KEY (Story 2.11 — R2 client)
    # - BUTTONDOWN_API_KEY   (Story 5.10 — newsletter pipeline)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

