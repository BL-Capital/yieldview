name: Daily Pipeline

on:
  # schedule:
  #   - cron: '0 7 * * 1-5'   # 7h UTC = 8h/9h Paris, weekdays only
  # ⚠️  Cron désactivé — en attente des secrets GitHub (voir issue #13)
  # Réactiver en décommentant les 2 lignes ci-dessus une fois les secrets configurés
  workflow_dispatch:          # Manual trigger for testing

# Secrets required in GitHub Settings > Secrets and variables > Actions:
# - FINNHUB_API_KEY      (Finnhub market data)
# - FRED_API_KEY         (FRED sovereign rates + VIX history)
# - ALPHA_VANTAGE_API_KEY (Alpha Vantage, marginal)
# - ANTHROPIC_API_KEY    (Claude API for AI briefing)
# - R2_ACCESS_KEY_ID     (Cloudflare R2 storage)
# - R2_SECRET_ACCESS_KEY (Cloudflare R2 storage)
# - R2_BUCKET_NAME       (Cloudflare R2 bucket)
# - R2_ENDPOINT          (Cloudflare R2 S3-compatible endpoint)
# - R2_PUBLIC_URL         (R2 public CDN URL for fallback reads)

jobs:
  pipeline:
    name: Fetch → Generate → Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch market data + compute alert
        run: pnpm tsx scripts/pipeline/fetch-data.ts > /tmp/pipeline-data.json
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Generate AI briefing
        run: cat /tmp/pipeline-data.json | pnpm tsx scripts/pipeline/generate-ai.ts > /tmp/analysis.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Publish to R2
        run: cat /tmp/analysis.json | pnpm tsx scripts/pipeline/publish-r2.ts
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

      - name: Log pipeline run (success)
        if: success()
        run: pnpm tsx scripts/pipeline/log-run.ts --status success
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log pipeline run (failure)
        if: failure()
        run: pnpm tsx scripts/pipeline/log-run.ts --status failure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
