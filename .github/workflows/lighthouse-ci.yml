name: Lighthouse CI

on:
  push:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse Audit (≥ 90)
    runs-on: ubuntu-latest
    # DISABLED until Sprint 6 Story 6.1 — page placeholder Sprint 1 n'a pas les optimisations finales
    # Activé en Story 6.1 (Lighthouse CI gates) quand l'UI Epic 3-5 sera complète
    if: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run Lighthouse CI
        run: npx @lhci/cli@latest autorun
