<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#0F1923" stroke="#991B1B" stroke-width="3" opacity="0.9"/>
  <!-- Outer glow -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#991B1B" stroke-width="12" opacity="0.2"/>
  <!-- Alert triangle -->
  <path d="M60 10 L90 62 L30 62 Z" fill="#991B1B" opacity="0.15"/>
  <!-- Face -->
  <circle cx="60" cy="52" r="26" fill="#1A2733"/>
  <!-- Eyes - panic (X shape) -->
  <line x1="44" y1="41" x2="56" y2="53" stroke="#991B1B" stroke-width="3" stroke-linecap="round"/>
  <line x1="56" y1="41" x2="44" y2="53" stroke="#991B1B" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="41" x2="76" y2="53" stroke="#991B1B" stroke-width="3" stroke-linecap="round"/>
  <line x1="76" y1="41" x2="64" y2="53" stroke="#991B1B" stroke-width="3" stroke-linecap="round"/>
  <!-- Grimace mouth -->
  <path d="M48 63 Q53 58 60 61 Q67 64 72 59" stroke="#991B1B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Sweat drop -->
  <ellipse cx="80" cy="44" rx="3" ry="4" fill="#1E40AF" opacity="0.7"/>
  <!-- Level indicator dots - crisis (all lit + warning) -->
  <circle cx="36" cy="88" r="5" fill="#991B1B" opacity="0.9"/>
  <circle cx="50" cy="88" r="5" fill="#991B1B" opacity="0.9"/>
  <circle cx="64" cy="88" r="5" fill="#991B1B" opacity="0.9"/>
  <circle cx="78" cy="88" r="5" fill="#991B1B" opacity="0.9"/>
  <!-- Exclamation -->
  <text x="93" y="92" font-family="monospace" font-size="14" fill="#991B1B" font-weight="bold">!</text>
</svg>
